<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff5a2b" />
    <meta name="description" content="LobbyRush is a gamer community web app for FIFA, GTA, and Call of Duty Warzone squads, events, chat, and posts." />
    <meta http-equiv="refresh" content="0; url=preview.html" />
    <link rel="canonical" href="preview.html" />
    <link rel="icon" href="assets/lobbyrush-logo.svg" />

      :root {

  <body>
    <main>
      <img src="assets/lobbyrush-logo.svg" alt="LobbyRush logo" />
      <h1>Opening LobbyRush</h1>
      <p><a href="preview.html">Open LobbyRush manually</a></p>
    </main>
    <script>
      window.location.replace("preview.html" + window.location.search + window.location.hash);
